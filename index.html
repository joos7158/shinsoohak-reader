      {

        "start": 3300,

        "쪽": 20,
        "개념": "$\\lim_{x\\to\\infty}(\\sqrt{f(x)}-2x)=$유한이면 $f(x)$의 최고차는 $4x^2$. 유리화로 나머지 계수를 결정한다.",

        "start": 3480,
        "end": 3706,
        "쪽": 21,
        "개념": "도형에서 구하는 좌표·길이·넓이를 식으로 나타낸 뒤, 극한의 성질·조임정리로 극한값을 구한다."

// ── 렌더링 ──
const app = document.getElementById('app');
const mmss = s => `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;

// ── 열람 기록 비콘 (구글 폼) — 학생별 ?s=코드 로 접속하면 열람이 시트에 기록됨 ──
const LOG = {
  action: "https://docs.google.com/forms/d/e/1FAIpQLSf4uKawAYL5SKV4A2yGv8ok_2VGIs-4opvnh6CpeljkY35LeA/formResponse",
  코드: "entry.1580342508", 내용: "entry.1507722106"
};
const SID = new URLSearchParams(location.search).get('s') || '';

// ── 과정별 자동 노출 ── 학생 코드 → 수강 과정(노션 명단 기준). 각 단원의 course 와 일치하는 것만 표시.
//   · 코드 없음/미등록 = 전체 노출(기존과 동일)   · extra:[단원key] = 예외로 추가 노출(하이브리드)
const STUDENTS = {
  pj7q: { name:"박지휴", courses:["공통수학2"] },
  ks3m: { name:"김시은", courses:["공통수학2"] },
  id5v: { name:"이다연", courses:["공통수학2"] },
  hd8x: { name:"홍단",   courses:["공통수학2"] },
  is6h: { name:"이수현", courses:["미적분Ⅰ"] },
};
const _me = STUDENTS[SID] || null;
function unitVisible(u) {
  if (!_me) return true;                                  // 무코드/미등록 → 전체
  if ((_me.extra || []).includes(u.key)) return true;     // 예외 추가
  return (_me.courses || []).includes(u.course);          // 내 과정과 일치
}

const _logged = new Set();
function logView(label) {
  if (!SID || _logged.has(label)) return;   // 코드 없으면 기록 안 함 / 같은 세션 중복 방지
  _logged.add(label);
  const body = new URLSearchParams();
  body.append(LOG.코드, SID);
  body.append(LOG.내용, label);
  fetch(LOG.action, { method:'POST', mode:'no-cors', body }).catch(()=>{});
}
if (SID) logView('(리더 열기)');

function slot(title, html) {
  const body = html
    ? `<div class="slot-body">${html}</div>`
    : `<div class="slot-body slot-empty">아직 준비 중</div>`;
  return `<details><summary>${title}</summary>${body}</details>`;
}

function renderHome() {
  app.innerHTML = `
    <h1>신수학 대표유형 강의</h1>
    <div class="sub">단원을 누르면 유형별 강의로 이동합니다 · 유형을 누르면 해당 구간만 재생</div>
    ${UNITS.map((u, U) => ({ u, U })).filter(x => unitVisible(x.u)).map(({ u, U }) => `
      <div class="card type-card" onclick="location.hash='#u${U}'">
        <span class="num" style="min-width:0;padding:6px 12px">단원</span>
        <span class="name">${u.title}</span>
        <span class="info">${u.segments.length}개 유형 · ${u.video.date}</span>
      </div>`).join('') || '<div class="card slot-empty" style="text-align:center">배정된 강의가 아직 없습니다.</div>'}
    <div class="note">신수학 재원생 전용 · 문의는 원장님께</div>`;
}

function renderUnitList(U) {
  const u = UNITS[U];
  app.innerHTML = `
    <a class="back" href="#">← 단원 목록</a>
    <h1>${u.title} — 대표유형 강의</h1>
    <div class="sub">${u.video.unit} · ${u.video.date} 녹화 · 유형을 누르면 해당 구간만 재생됩니다</div>
    ${u.segments.map((s, i) => `
      <div class="card type-card" onclick="location.hash='#u${U}q${i}'">
        <span class="num">${s.유형}</span>
        <span class="name">${s.이름}</span>
        <span class="info">${mmss(s.end - s.start)} · ${s.문항}</span>
      </div>`).join('')}
    <div class="note">신수학 재원생 전용 · 문의는 원장님께</div>`;
}

function renderDetail(U, i) {
  const u = UNITS[U], s = u.segments[i], V = u.video;
  logView(`${u.title} · ${s.유형} ${s.이름}`);
  const isConcept = /^유형|개념/.test(s.문항) || s.문항.includes('유형');
  app.innerHTML = `
    <a class="back" href="#u${U}">← ${u.title} 유형 목록</a>
    <div class="card">
      <div class="meta"><span class="badge">${s.유형}</span><span class="unit">${V.unit}</span></div>
      <h1>${s.이름}</h1>
      ${s.문제
        ? `<div class="problem">${s.문제}</div>
           <div class="choices">${(s.선지||[]).map(c => `<span>${c}</span>`).join('')}</div>`
        : `<div class="problem slot-empty">${V.textbook} ${s.쪽}쪽 · ${s.문항}${isConcept?'':'번'} (교재를 펴 놓고 들으세요)</div>`}
      ${V.youtube
        ? `<iframe class="player" allowfullscreen
             src="https://www.youtube.com/embed/${V.youtube}?start=${s.start}&end=${s.end}&rel=0"></iframe>`
        : `<div class="problem slot-empty">🎬 강의 영상 업로드 준비 중입니다 (${mmss(s.start)}~${mmss(s.end)} 구간)</div>`}
      ${slot('개념', s.개념)}
      ${slot('유사문제', s.유사문제)}
      ${slot('정답', s.정답)}
      ${slot('풀이', s.풀이)}
    </div>`;
  if (window.renderMathInElement) renderMathInElement(app, {
    delimiters: [{left:'$$', right:'$$', display:true}, {left:'$', right:'$', display:false}]
  });
}

function route() {
  const d = location.hash.match(/^#u(\d+)q(\d+)$/);
  const l = location.hash.match(/^#u(\d+)$/);
  if (d && UNITS[+d[1]] && unitVisible(UNITS[+d[1]]) && UNITS[+d[1]].segments[+d[2]]) renderDetail(+d[1], +d[2]);
  else if (l && UNITS[+l[1]] && unitVisible(UNITS[+l[1]])) renderUnitList(+l[1]);
  else renderHome();
  window.scrollTo(0, 0);
}
window.addEventListener('hashchange', route);
document.addEventListener('DOMContentLoaded', route);
</script>
</body>
</html>
